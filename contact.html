<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — ANATI</title>
  <meta name="description" content="Have a question or want to work together? I'd love to hear from you." />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="contact.css" />
</head>
<body>

  

  <!-- ============ CONTACT SECTION ============ -->
  <section class="contact-section">
    <div class="container">
      <div class="contact-grid">

        <!-- Left: Info -->
        <div class="contact-info fade-in">
          <p class="label">Reach out</p>
          <h1 class="display-lg mt-16">
            Let's<br>
            <em style="color: var(--sage);">Connect.</em>
          </h1>
          <div class="divider mt-24"></div>
          <p class="body-text mt-24" style="max-width: 320px;">
            Have a question or want to work together? I'd love to hear from you.
          </p>

          <div class="contact-details mt-48">
            <div class="contact-detail">
              <span class="contact-detail-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
              <a href="mailto:hello@anati.in" class="contact-detail-text">hello@anati.in</a>
            </div>
            <div class="contact-detail">
              <span class="contact-detail-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              </span>
              <span class="contact-detail-text">India</span>
            </div>
          </div>

          <div class="contact-social mt-40">
            <p class="label mb-16">Follow the journey</p>
            <div class="social-links">
              <a href="#" class="social-link" aria-label="Instagram">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
                Instagram
              </a>
              <a href="#" class="social-link" aria-label="X">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.259 5.632L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>
                X (Twitter)
              </a>
              <a href="#" class="social-link" aria-label="YouTube">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.96-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" stroke-linejoin="round"/></svg>
                YouTube
              </a>
            </div>
          </div>
        </div>

        <!-- Right: Form -->
        <div class="contact-form-wrap fade-in fade-in-delay-2">
          <!--
            Formspree: Replace YOUR_FORM_ID below with your Formspree endpoint.
            Sign up free at formspree.io, create a form, and get your ID.
            Example: action="https://formspree.io/f/xpzgwkrb"
          -->
          <form
            action="https://formspree.io/f/YOUR_FORM_ID"
            method="POST"
            class="contact-form"
            id="contactForm"
          >
            <div class="form-row">
              <div class="form-group">
                <label for="name">Name</label>
                <input
                  type="text"
                  id="name"
                  name="name"
                  placeholder="Your name"
                  required
                />
              </div>
              <div class="form-group">
                <label for="email">Email</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="your@email.com"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <label for="subject">Subject</label>
              <input
                type="text"
                id="subject"
                name="subject"
                placeholder="What is this about?"
              />
            </div>

            <div class="form-group">
              <label for="message">Message</label>
              <textarea
                id="message"
                name="message"
                rows="7"
                placeholder="Share your thoughts..."
                required
              ></textarea>
            </div>

            <button type="submit" class="btn btn-sage" style="width: 100%; justify-content: center;">
              Send Message <span class="arrow-icon">→</span>
            </button>

            <!-- Success / error messages -->
            <p class="form-success" id="formSuccess" style="display:none;">
              Thank you. Your message has been sent.
            </p>
            <p class="form-error" id="formError" style="display:none;">
              Something went wrong. Please email hello@anati.in directly.
            </p>
          </form>
        </div>

      </div>
    </div>
  </section>

  <script>
    // Basic Formspree AJAX handler
    const form = document.getElementById('contactForm');
    const success = document.getElementById('formSuccess');
    const error = document.getElementById('formError');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      const data = new FormData(form);
      try {
        const res = await fetch(form.action, {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          form.reset();
          success.style.display = 'block';
          error.style.display = 'none';
        } else {
          throw new Error('Form submission failed');
        }
      } catch {
        error.style.display = 'block';
        success.style.display = 'none';
      }
    });
  </script>
  <script src="nav.js"></script>
</body>
</html>
